openapi: 3.1.1
info:
  title: FakeAPI Store
  version: 1.2.3
  description: |-
    This is a sample FakeAPI Store Server based on the OpenAPI 3.X specification. You can find out more about Swagger at https://swagger.io. In the third iteration of the pet store, we've switched to the design first approach. You can now help us improve the API whether it's by making changes to the definition itself or to the code. That way, with time, we can improve the API in general, and expose some of the new features in OAS3.

    Some useful links:
    - [The Fake Store repository](https://github.com/platzi/curso-apifirst)
  termsOfService: "https://terms.com"
  contact:
    name: Antelmo Verdugo
    email: antelmo@mail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
externalDocs:
  description: "external resources"
  url: https://externaldocs.com
tags:
  - name: Users
    description: Operations related to users
  - name: Products
    description: Operations related to products
servers:
  - url: http://localhost:3000/v1
    description: API V1
  - url: http://localhost:3000/v2
    description: API V2
components:
  schemas:
    HomeResponse:
      type: string
      example: Welcome to FakeAPI Store
    HelloResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
      example:
        message: Hello World
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
      example:
        message: Resource not found
    ProductRating:
      type: object
      required:
        - score
        - comments
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
        comments:
          type: string
          maxLength: 200
      additionalProperties: false
      example:
        score: 5
        comments: Excellent quality and fast shipping.
    Product:
      type: object
      required:
        - name
        - price
        - category
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: "Product 1"
        description:
          type: string
          maxLength: 500
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
        category:
          type: string
          enum: [electronics, book, clothes, food]
        tags:
          type: array
          items:
            type: string
          minItems: 1
        inStock:
          type: boolean
        specs:
          type: object
          additionalProperties:
            type: string
        rating:
          type: array
          items:
            $ref: "#/components/schemas/ProductRating"
      additionalProperties: false
      example:
        name: Product 1
        description: Wireless headphones with noise cancellation.
        price: 129.99
        category: electronics
        tags:
          - audio
          - wireless
        inStock: true
        specs:
          color: black
          battery: 30h
        rating:
          - score: 5
            comments: Great sound and comfort.
    ProductWithId:
      type: object
      required:
        - id
        - name
        - price
        - category
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
        category:
          type: string
          enum: [electronics, book, clothes, food]
        tags:
          type: array
          items:
            type: string
          minItems: 1
        inStock:
          type: boolean
        specs:
          type: object
          additionalProperties:
            type: string
        rating:
          type: array
          items:
            $ref: "#/components/schemas/ProductRating"
      additionalProperties: false
      example:
        id: 1
        name: Product 1
        description: Wireless headphones with noise cancellation.
        price: 129.99
        category: electronics
        tags:
          - audio
          - wireless
        inStock: true
        specs:
          color: black
          battery: 30h
        rating:
          - score: 5
            comments: Great sound and comfort.
    ProductUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
        category:
          type: string
          enum: [electronics, book, clothes, food]
        tags:
          type: array
          items:
            type: string
          minItems: 1
        inStock:
          type: boolean
        specs:
          type: object
          additionalProperties:
            type: string
        rating:
          type: array
          items:
            $ref: "#/components/schemas/ProductRating"
      additionalProperties: false
      example:
        price: 119.99
        inStock: false
        tags:
          - audio
          - sale
    UserCreate:
      type: object
      required:
        - name
        - age
        - email
      properties:
        name:
          type: string
          minLength: 2
        age:
          type: integer
          minimum: 18
        email:
          type: string
          format: email
      example:
        name: Jane Doe
        age: 28
        email: jane.doe@example.com
    UserWithId:
      type: object
      required:
        - id
        - name
        - age
        - email
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        email:
          type: string
      example:
        id: 1
        name: Jane Doe
        age: 28
        email: jane.doe@example.com
    UserUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
      example:
        name: Jane Smith
paths:
  /:
    get:
      summary: Home
      responses:
        "200":
          description: A successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeResponse"
  /hello:
    get:
      summary: Hello World
      responses:
        "200":
          description: A successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloResponse"
  /users:
    post:
      tags:
        - Users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithId"
  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithId"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - Users
      summary: Update user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithId"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products:
    get:
      tags:
        - Products
      summary: List all products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithId"
    post:
      tags:
        - Products
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithId"
  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithId"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - Products
      summary: Update product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithId"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
